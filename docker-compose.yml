services:
  postgres:
    image: postgres:16-alpine
    container_name: baker-postgres
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-baker}'
      POSTGRES_USER: '${POSTGRES_USER:-baker}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-baker}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: baker-redis
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # Optional TURN relay for WebRTC reliability across NAT/VPN/cross-region networks.
  # This is for local development/testing only. Public deployment should use the
  # bundled TURN support inside `blockcat233/baker`.
  turn:
    image: coturn/coturn:4.6.2
    container_name: baker-turn
    profiles: ['turn']
    restart: unless-stopped
    ports:
      - '${TURN_PORT:-3478}:${TURN_PORT:-3478}/tcp'
      - '${TURN_PORT:-3478}:${TURN_PORT:-3478}/udp'
      - '${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/tcp'
      - '${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/udp'
    environment:
      TURN_USERNAME: '${TURN_USERNAME:-}'
      TURN_PASSWORD: '${TURN_PASSWORD:-}'
      TURN_REALM: '${TURN_REALM:-baker}'
      TURN_PORT: '${TURN_PORT:-3478}'
      TURN_MIN_PORT: '${TURN_MIN_PORT:-49160}'
      TURN_MAX_PORT: '${TURN_MAX_PORT:-49200}'
      TURN_EXTERNAL_IP: '${TURN_EXTERNAL_IP:-}'
    entrypoint: ['/bin/sh', '-ec']
    command:
      - |
        if [ -z "$$TURN_USERNAME" ] || [ -z "$$TURN_PASSWORD" ]; then
          echo "TURN_USERNAME/TURN_PASSWORD must be set before starting the local TURN relay. Refusing to start an open TURN relay."
          exit 1
        fi
        if [ -n "$$TURN_EXTERNAL_IP" ]; then
          EXTERNAL_IP_ARG="--external-ip=$$TURN_EXTERNAL_IP"
        else
          EXTERNAL_IP_ARG=""
        fi
        exec turnserver -n --log-file=stdout --fingerprint --lt-cred-mech \
          --realm="$$TURN_REALM" \
          --user="$$TURN_USERNAME:$$TURN_PASSWORD" \
          --listening-port="$$TURN_PORT" \
          --min-port="$$TURN_MIN_PORT" \
          --max-port="$$TURN_MAX_PORT" \
          --no-cli --no-multicast-peers \
          $$EXTERNAL_IP_ARG

volumes:
  postgres-data:
  redis-data:
